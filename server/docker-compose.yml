services:

  server:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mama-health-server
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/mama_health
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=2)",
        ]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s
    ports:
      - "8000:8000"

  postgres:
    image: postgres:16-alpine
    container_name: mama-health-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: mama_health
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d mama_health"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
